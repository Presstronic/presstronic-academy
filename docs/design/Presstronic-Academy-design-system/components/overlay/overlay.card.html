<!-- @dsCard group="Components" viewport="700x330" subtitle="Dialog, Tooltip" name="Overlay" -->
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-page);font-family:var(--font-body);color:var(--text-body);}</style>
<div id="root"></div>
<script type="text/babel">
const NS = window[Object.keys(window).find(k => { try { return window[k] && typeof window[k] === 'object' && (window[k].Button || window[k].Input || window[k].Dialog); } catch(e){ return false; } })] || {};

const { Dialog, Tooltip, Button, Badge } = NS;
function Demo() {
  return (
    <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
        <Tooltip content="+120 XP on completion"><Badge tone="cyan">XP</Badge></Tooltip>
        <Tooltip content="Requires clearance 03" side="bottom"><Button variant="ghost" size="sm">Locked branch</Button></Tooltip>
        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '.08em', color: 'var(--text-muted)' }}>HOVER THE ELEMENTS</span>
      </div>
      <div style={{ position: 'relative', height: 220, border: '1px solid var(--border-hairline)' }}>
        <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.65)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
          <div style={{ width: 400, background: 'var(--surface-overlay)', border: '1px solid var(--border-strong)', boxShadow: 'var(--shadow-3)', clipPath: 'var(--notch)' }}>
            <div style={{ padding: '18px 22px 0', display: 'flex', flexDirection: 'column', gap: 6 }}>
              <div style={{ fontFamily: 'var(--font-mono)', fontSize: 10, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--cyan-400)' }}>// CONFIRM</div>
              <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 19, letterSpacing: '-0.02em', color: 'var(--text-strong)' }}>Abandon this branch?</div>
            </div>
            <div style={{ padding: '10px 22px 16px', fontSize: 13, lineHeight: 1.6 }}>Progress on this path will be checkpointed, not lost.</div>
            <div style={{ padding: '12px 22px', borderTop: '1px solid var(--border-hairline)', display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
              <Button variant="ghost" size="sm">Stay</Button>
              <Button variant="destructive" size="sm">Abandon</Button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);

</script>
