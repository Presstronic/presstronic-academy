<!-- @dsCard group="Colors" viewport="700x170" subtitle="Signal cyan — the one working accent" name="Signal cyan" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div class="row">

  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--cyan-300); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">cyan-300</div>
    <div class="lbl">--cyan-300</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--cyan-400); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">cyan-400</div>
    <div class="lbl">--cyan-400</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--cyan-500); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">cyan-500</div>
    <div class="lbl">--cyan-500</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--cyan-600); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">cyan-600</div>
    <div class="lbl">--cyan-600</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--cyan-700); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">cyan-700</div>
    <div class="lbl">--cyan-700</div>
  </div>
  <div style="flex:1.6; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--tint-cyan); border:1px solid var(--border-accent); display:flex; align-items:center; justify-content:center; color:var(--cyan-300); font-family:var(--font-mono); font-size:12px;">tint + accent border</div>
    <div class="lbl">--tint-cyan / --border-accent</div>
  </div>
</div>
