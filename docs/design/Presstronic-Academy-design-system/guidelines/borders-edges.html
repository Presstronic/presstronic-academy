<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Hairlines + 2px accent edge for selection" name="Borders & edges" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div class="row" style="padding:24px; gap:16px;">
  <div style="flex:1; border:1px solid var(--border-hairline); padding:14px;"><div class="lbl">HAIRLINE — RESTING</div></div>
  <div style="flex:1; border:1px solid var(--border-strong); padding:14px;"><div class="lbl">STRONG — HOVER</div></div>
  <div style="flex:1; border:1px solid var(--border-hairline); border-left:2px solid var(--cyan-500); background:var(--tint-cyan); padding:14px;"><div class="lbl" style="color:var(--cyan-300);">SELECTED — CYAN EDGE</div></div>
  <div style="flex:1; border:1px solid var(--border-hairline); border-left:2px solid var(--volt-500); background:var(--tint-volt); padding:14px;"><div class="lbl" style="color:var(--volt-300);">STORY CHOICE — VOLT EDGE</div></div>
</div>
