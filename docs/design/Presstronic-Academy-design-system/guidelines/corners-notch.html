<!-- @dsCard group="Spacing" viewport="700x180" subtitle="Radius 0 everywhere · one notched corner as signature" name="Corners & notch" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div class="row" style="padding:24px; gap:20px;">
  <div style="flex:1; background:var(--surface-card); border:1px solid var(--border-hairline); padding:16px; display:flex; flex-direction:column; gap:6px;">
    <div class="lbl">STANDARD CARD</div>
    <div style="font-size:13px;">Square. Hairline border.</div>
  </div>
  <div style="flex:1; background:var(--surface-card); border:1px solid var(--border-strong); clip-path:var(--notch); padding:16px; display:flex; flex-direction:column; gap:6px;">
    <div class="lbl" style="color:var(--cyan-400);">NOTCHED CARD</div>
    <div style="font-size:13px;">clip-path: var(--notch) — 12px, top-right. Max one element class per screen.</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:10px; justify-content:center;">
    <button style="font-family:var(--font-mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; background:var(--cyan-500); color:var(--text-on-accent); border:none; padding:12px 18px; clip-path:var(--notch); cursor:pointer;">BEGIN MISSION</button>
    <div class="lbl">CTA with notch</div>
  </div>
</div>
