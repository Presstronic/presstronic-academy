<!-- @dsCard group="Colors" viewport="700x170" subtitle="Volt yellow reserve + semantic status" name="Volt & status" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div class="row">

  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--volt-400); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">volt-400</div>
    <div class="lbl">--volt-400</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--volt-500); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">volt-500</div>
    <div class="lbl">--volt-500</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--green-400); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">green-400</div>
    <div class="lbl">--green-400</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--red-500); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">red-500</div>
    <div class="lbl">--red-500</div>
  </div>
  <div style="flex:2; display:flex; flex-direction:column; gap:8px; justify-content:center; padding-left:8px; border-left:1px solid var(--border-hairline);">
    <div class="lbl" style="color:var(--volt-400);">// VOLT: STORY CHOICES + CAUTION ONLY</div>
    <div class="lbl" style="color:var(--green-400);">// GREEN: SUCCESS</div>
    <div class="lbl" style="color:var(--red-400);">// RED: DANGER</div>
  </div>
</div>
