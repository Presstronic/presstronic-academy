<!-- @dsCard group="Brand" viewport="700x180" subtitle="Faint 48px grid, radial fade — the only permitted decoration" name="Grid background" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div style="height:180px; position:relative; background:var(--surface-page); overflow:hidden; display:flex; align-items:center; justify-content:center;">
  <div style="position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px); background-size:48px 48px; -webkit-mask-image:radial-gradient(ellipse 70% 90% at 50% 40%, black 30%, transparent 75%); mask-image:radial-gradient(ellipse 70% 90% at 50% 40%, black 30%, transparent 75%);"></div>
  <div style="position:absolute; inset:0; background:radial-gradient(ellipse 40% 55% at 50% 35%, color-mix(in oklab, var(--cyan-500) 9%, transparent), transparent 70%);"></div>
  <div style="position:relative; font-family:var(--font-display); font-weight:800; font-size:32px; letter-spacing:-0.02em; color:var(--text-strong);">Hero backdrop</div>
</div>
