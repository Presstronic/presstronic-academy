<!-- @dsCard group="Colors" viewport="700x170" subtitle="Dark surface stack" name="Surfaces (dark)" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div class="row">

  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-page); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">page</div>
    <div class="lbl">--surface-page</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-raised); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">raised</div>
    <div class="lbl">--surface-raised</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-card); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">card</div>
    <div class="lbl">--surface-card</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-overlay); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">overlay</div>
    <div class="lbl">--surface-overlay</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-inset); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">inset</div>
    <div class="lbl">--surface-inset</div>
  </div>
</div>
