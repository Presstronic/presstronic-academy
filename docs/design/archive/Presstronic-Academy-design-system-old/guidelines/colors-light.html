<!-- @dsCard group="Colors" viewport="700x170" subtitle="Light mode via [data-theme=light]" name="Light mode" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font: var(--type-body); font-family: var(--font-body); background: var(--surface-page); color: var(--text-body); }
  .row { display:flex; gap:12px; padding:20px; align-items:stretch; }
  .lbl { font-family: var(--font-mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color: var(--text-muted); }
</style>
<div data-theme="light" style="background:var(--surface-page); padding:0;">
<div class="row">

  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-page); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">page</div>
    <div class="lbl">--surface-page</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:64px; background:var(--surface-card); border:1px solid var(--border-hairline);"></div>
    <div class="lbl" style="color:var(--text-strong); font-size:11px;">card</div>
    <div class="lbl">--surface-card</div>
  </div>
  <div style="flex:2; display:flex; flex-direction:column; gap:10px; justify-content:center;">
    <div style="color:var(--text-strong); font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:var(--tracking-display);">Text strong on light</div>
    <div style="color:var(--text-body); font-size:13px;">Body text — same tokens, remapped.</div>
    <div style="display:flex; gap:8px;">
      <span style="background:var(--primary); color:var(--primary-foreground); font-family:var(--font-mono); font-size:11px; padding:6px 12px;">PRIMARY</span>
      <span style="background:var(--tint-cyan); color:var(--accent-foreground); font-family:var(--font-mono); font-size:11px; padding:6px 12px; border:1px solid var(--border-accent);">ACCENT TINT</span>
    </div>
  </div>
</div>
</div>
